# .github/workflows/deploy.yml
name: Deploy Static Content to Pages

on:
  # Run this workflow whenever a push is made to the main branch
  push:
    branches: ["main"] 
  # Allows manual re-running
  workflow_dispatch:

# Set permissions for the deployment
permissions:
  contents: read
  pages: write # Required to write to GitHub Pages
  id-token: write # Required for deployment action

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies and Build
        # Runs the build command defined in your package.json
        run: npm install && npm run build 

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # CRITICAL: This uploads the generated build files
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
